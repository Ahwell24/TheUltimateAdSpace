<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Digital Billboard | One Day, One Owner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4500;
            --accent: #00ff88;
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 40px;
            text-align: center;
        }

        h1 {
            font-size: clamp(1.8rem, 7vw, 3rem);
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .ad-card {
            width: 95%;
            max-width: 1000px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
        }

        .live-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(0, 255, 136, 0.05);
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .day-counter {
            font-weight: bold;
            color: #aaa;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .day-number { color: white; font-weight: 900; margin-left: 4px; }

        .video-wrapper {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        .info-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .info-box {
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            text-align: center;
        }

        .info-label { color: #888; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 5px; }
        .info-value { font-size: 1rem; font-weight: bold; overflow-wrap: break-word; }
        .info-value a { color: var(--accent); text-decoration: none; }

        .pricing-section {
            margin-top: 40px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
        }

        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .price-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .price-item.next { border-color: rgba(255, 69, 0, 0.2); }

        .price-tag-label { 
            display: block; 
            font-size: 0.8rem; 
            font-weight: 700; 
            color: #888; 
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .amount { font-size: 2.2rem; font-weight: 900; }
        .price-item.next .amount { color: var(--primary); }

        .cta-button {
            display: block;
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 20px;
            font-size: 1.4rem;
            font-weight: 900;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.3);
            margin-bottom: 25px;
        }

        .cta-button:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255, 69, 0, 0.5); }

        .rule-box {
            font-size: 0.85rem;
            color: #666;
            line-height: 1.5;
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .rule-box strong { color: #aaa; display: block; margin-bottom: 5px; }

        .reset-timer { margin-top: 10px; font-size: 0.75rem; color: #444; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        @media (max-width: 600px) {
            .info-panel { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>THE ULTİMATE AD SPACE</h1>
    </header>

    <main class="ad-card">
        <div class="live-status">
            <div class="status-badge">
                <div class="live-dot"></div>
                LIVE
            </div>
            <div class="day-counter">
                DAY <span class="day-number">001</span>
            </div>
        </div>

        <div class="video-wrapper">
            <video autoplay muted loop playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>

        <div class="info-panel">
            <div class="info-box">
                <div class="info-label">Current Owner</div>
                <div class="info-value">@YourUsername</div>
            </div>
            <div class="info-box">
                <div class="info-label">Target Link</div>
                <div class="info-value"><a href="https://yourlink.com" target="_blank">Visit Site →</a></div>
            </div>
        </div>
    </main>

    <section class="pricing-section">
        <div class="price-grid">
            <div class="price-item">
                <span class="price-tag-label">Today</span>
                <span class="amount">$1</span>
            </div>
            <div class="price-item next">
                <span class="price-tag-label">Tomorrow</span>
                <span class="amount">$2</span>
            </div>
        </div>

        <a href="https://www.shopier.com/TheUltimateSpace/46545321" class="cta-button">BOOK SPACE NOW</a>

        <div class="rule-box">
            <strong>FAIR PLAY RULES:</strong>
            Only 1 spot available per 24h. First successful payment secures the slot. 
            <div class="reset-timer">Price increases at 00:00 every day.</div>
        </div>
    </section>

    <footer style="margin: 40px 0; color: #222; font-size: 0.7rem; letter-spacing: 2px;">
        THE ULTİMATE AD SPACE 2026
    </footer>

</body>
</html>
