<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Ad Space | Daily Digital Billboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4500;
            --accent: #00ff88;
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%;
            width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(255, 69, 0, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        header {
            margin-top: 40px;
            text-align: center;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid rgba(0, 255, 136, 0.3);
            margin-bottom: 20px;
        }

        /* Video alanı daha büyük ve heybetli */
        .ad-card {
            width: 95%;
            max-width: 1100px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: fadeInUp 1s ease 0.2s both;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            background: #000;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        .info-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
        }

        .info-box { text-align: left; }
        .info-label { color: #888; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .info-value { font-size: 1.2rem; font-weight: bold; }
        .info-value a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: 0.3s; }
        .info-value a:hover { border-bottom: 1px solid var(--accent); }

        .pricing-section {
            margin-top: 50px;
            text-align: center;
            animation: fadeInUp 1s ease 0.4s both;
            padding-bottom: 60px;
        }

        .price-grid {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 30px;
        }

        .price-item .label { display: block; color: #888; margin-bottom: 5px; font-size: 0.9rem; }
        .price-item .amount { font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 800; color: #fff; }
        .price-item.next .amount { color: var(--primary); }

        .cta-button {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 22px 70px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 800;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(255, 69, 0, 0.4);
        }

        .cta-button:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 45px rgba(255, 69, 0, 0.6);
        }

        .reset-text {
            margin-top: 25px;
            color: #666;
            font-size: 0.9rem;
            font-weight: 500;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .info-panel { grid-template-columns: 1fr; }
            .price-grid { gap: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="status-badge">● LIVE: AD SPACE #001</div>
        <h1>The Ultimate Space</h1>
    </header>

    <main class="ad-card">
        <div class="video-wrapper">
            <video autoplay muted loop playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>

        <div class="info-panel">
            <div class="info-box">
                <div class="info-label">CURRENT OWNER</div>
                <div class="info-value">@YourUsername</div>
            </div>
            <div class="info-box">
                <div class="info-label">WEBSITE / LINK</div>
                <div class="info-value"><a href="https://yourlink.com" target="_blank">VISIT NOW →</a></div>
            </div>
        </div>
    </main>

    <section class="pricing-section">
        <div class="price-grid">
            <div class="price-item">
                <span class="label">TODAY'S PRICE</span>
                <span class="amount">$10</span>
            </div>
            <div class="price-item next">
                <span class="label">TOMORROW</span>
                <span class="amount">$20</span>
            </div>
        </div>
        
        <a href="YOUR_SHOPIER_LINK" class="cta-button">BOOK YOUR SPACE NOW</a>
        <p class="reset-text">Price increases every day at 00:00.</p>
    </section>

    <footer style="margin-bottom: 40px; color: #222; font-size: 0.7rem; letter-spacing: 2px;">
        EST. 2026 | NO REFUNDS | The Ultimate Ad Space
    </footer>

</body>
</html>
