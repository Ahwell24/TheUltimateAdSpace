<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Billboard | One Day, One Ad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4500;
            --accent: #00ff88;
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Arka plana hafif bir ışık efekti */
        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%;
            width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(255, 69, 0, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        header {
            margin-top: 40px;
            text-align: center;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid rgba(0, 255, 136, 0.3);
            margin-bottom: 20px;
        }

        /* Ana Kart Yapısı */
        .ad-card {
            width: 90%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeInUp 1s ease 0.2s both;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Bilgi Paneli */
        .info-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
        }

        .info-box { text-align: left; }
        .info-label { color: #888; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .info-value { font-size: 1.2rem; font-weight: bold; }
        .info-value a { color: var(--accent); text-decoration: none; }

        /* Fiyat ve Buton */
        .pricing-section {
            margin-top: 40px;
            text-align: center;
            animation: fadeInUp 1s ease 0.4s both;
        }

        .price-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        .price-item .label { display: block; color: #888; margin-bottom: 5px; }
        .price-item .amount { font-size: 2rem; font-weight: 800; color: #fff; }
        .price-item.next .amount { color: var(--primary); }

        .cta-button {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 69, 0, 0.5);
        }

        /* Animasyonlar */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .info-panel { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="status-badge">● LIVE: AD SPACE #001</div>
        <h1>Daily Billboard</h1>
    </header>

    <main class="ad-card">
        <div class="video-wrapper">
            <video autoplay muted loop playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>

        <div class="info-panel">
            <div class="info-box">
                <div class="info-label">Bugünkü Sahibi</div>
                <div class="info-value">@KullaniciAdi</div>
            </div>
            <div class="info-box">
                <div class="info-label">Website / Link</div>
                <div class="info-value"><a href="https://google.com" target="_blank">Ziyaret Et →</a></div>
            </div>
        </div>
    </main>

    <section class="pricing-section">
        <div class="price-grid">
            <div class="price-item">
                <span class="label">BUGÜN</span>
                <span class="amount">1$</span>
            </div>
            <div class="price-item next">
                <span class="label">YARIN</span>
                <span class="amount">2$</span>
            </div>
        </div>
        
        <a href="https://l.instagram.com/?u=https%3A%2F%2Fplay.google.com%2Fstore%2Fapps%2Fdetails%3Fid%3Dcom.ahmetfaruk.motivasyonaliskanlik%26pcampaignid%3Dweb_share%26utm_source%3Dig%26utm_medium%3Dsocial%26utm_content%3Dlink_in_bio%26fbclid%3DPAZXh0bgNhZW0CMTEAc3J0YwZhcHBfaWQMMjU2MjgxMDQwNTU4AAGnGjACo9JHFO3-ozUKWHAE0xJ808kOmwezo6W9g8kgh6UM5DslaQJ5M-u72l8_aem_0MP-r1kZf93XUquMKBc65w&e=AT7fQuebrBePGwB31rtcGmjcx8aiA1ePtofcqasXWvGE3ZL5Hrq2Gdvzzl8ft9VwvHBiBJTgVeA_kt93Er0MPQPmvPG3_rXCWJF9ve1V_A" class="cta-button">YERİNİ ŞİMDİ AYIRT</a>
        <p style="margin-top: 20px; color: #555; font-size: 0.8rem;">*Her gün Türkiye saatiyle 00:00'da fiyat artar.</p>
    </section>

    <footer style="margin: 50px 0; color: #333;">
        &copy; 2026 Million Dollar Video Space
    </footer>

</body>
</html>
